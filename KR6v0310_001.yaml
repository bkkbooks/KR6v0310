body:
  text: 民國岫廬譯如是我聞一時佛在波羅奈國鹿野苑中仙人住處爾時世尊告五比丘汝等比丘求遠世間應離二邊云何為二即彼根門放逸粗鄙下劣有損無益世俗樂邊及彼妄抑有損無益徒自苦邊比丘如來現已止息二邊契會中道以無比智發現寂滅清淨安穩等覺涅槃比丘如來緣何止息二邊契會中道以無比智發見寂滅清淨安隱等覺涅槃彼名即是八種聖道正見正思惟正語正業正命正精進正念正定如來緣此止息二邊契會中道以無比智發見寂滅清淨安隱等覺涅槃比丘此苦聖諦生苦老苦病苦死苦怨憎會苦愛別離苦求不得苦及彼無常五取蘊苦比丘此苦集聖諦即彼有情縱貪愛喜結生生緣流轉諸趣所謂欲愛有愛無有愛比丘此苦滅聖諦謂即從彼喜愛貪等捨棄離欲寂滅解脫比丘此苦滅道跡聖諦即彼八種正中之道所謂正見正思惟正語正業正命正精進正念正定比丘此苦聖諦前所未曾聞法當正思惟時於我生眼智明覺復次比丘應知此苦聖諦前所未曾聞法當正思惟時於我生眼智明覺復次比丘已知此苦聖諦前所未曾聞法當正思惟時於我生眼智明覺比丘此苦集聖諦前所未曾聞法當正思惟時於我生眼智明覺復次比丘應斷此苦集聖諦前所未曾聞法當正思惟時於我生眼智明覺復次比丘已斷此苦集聖諦前所未曾聞法當正思惟時於我生眼智明覺比丘此苦滅聖諦前所未曾聞法當正思惟時於我生眼智明覺復次比丘應證此苦滅聖諦前所未曾聞法當正思惟時於我生眼智明覺復次比丘已證此苦滅聖諦前所未曾聞法當正思惟時於我生眼智明覺比丘此苦滅道跡聖諦前所未曾聞法當正思惟時於我生眼智明覺復次比丘應修此苦滅道跡聖諦前所未曾聞法當正思惟時於我生眼智明覺復此比丘已修此苦滅道跡聖諦前所未曾聞法當正思惟時於我生眼智明覺比丘此四聖諦三轉十二行於我不生眼智明覺者我終不得於諸天魔梵沙門婆羅門天人聞法衆中為解脫為出為離亦不自證得阿耨多羅三藐三菩提比丘我已於此四聖諦三轉十二行生眼智明覺故我於諸天魔梵沙門婆羅門天人聞法衆中得出得脫自證得成阿耨多羅三藐三菩提所以然者我已如實通達了知法出離相證心解脫獲不退轉於未來法成不生故佛說此經已五比丘聞佛所說皆大歡喜讚言善哉得未曾有彼尊者憍陳如遠塵離垢得法眼淨於緣起法悟無生忍爾時地神聞佛說是轉法輪經已舉聲唱言今者世尊於波羅奈國仙人住處鹿野苑中說此諸沙門婆羅門諸天魔梵所未曾轉三轉十二行微妙法輪利安天人地神唱已其聲聞於四大王天三十三天焰摩天兜率天化樂天他化自在天須臾之間達於梵天亦各唱言今者世尊於波羅奈國仙人住處鹿野苑中說此諸沙門婆羅門諸天魔梵所未曾轉三轉十二行微妙法輪利安天人於是其聲剎那無間周遍梵世搖撼震吼動千世界天諸身光交相輝映此界他方悉皆大明爾時世尊告尊者憍陳如知法未憍陳如白佛已知世尊復告尊者憍陳如知法未憍陳如白佛已知尊者憍陳如已知法故是故名阿梵拘鄰尊者譯注阿若義同知拘鄰義等憍陳如
